services:

  db:
    image: postgres:16
    container_name: task_manager_db

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7

    container_name: task_manager_redis

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    build: .

    container_name: task_manager_api

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

    ports:
      - "8000:8000"

  notification_worker:
    build: .

    container_name: task_manager_notification_worker

    command: python subscriber.py

    env_file:
    - .env

    depends_on:
      db:
        condition: service_healthy
    
      redis:
        condition: service_healthy

volumes:
  postgres_data: